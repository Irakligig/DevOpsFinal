global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: critical
    - match:
        severity: warning
      receiver: warning

receivers:
  - name: default
    webhook_configs:
      - url: "http://app:5000/health"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "http://app:5000/health"
        send_resolved: true

  - name: warning
    webhook_configs:
      - url: "http://app:5000/health"
        send_resolved: true
