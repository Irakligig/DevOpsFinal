name: CI/CD Pipeline

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Security: Secrets Scanning ──────────────────────────────────
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint & Test ───────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Lint API
        working-directory: api
        run: npm run lint

      - name: Test API
        working-directory: api
        run: npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install Flask dependencies
        run: pip install -r app/requirements.txt

      - name: Test Flask App
        working-directory: app
        run: python -m pytest tests/ -v

  # ── Security: Dependency Scanning ─────────────────────────────────
  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (API)
        working-directory: api
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (Flask App)
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt

  # ── Security: Dockerfile & IaC Scanning ───────────────────────────
  config-scan:
    name: Config & Dockerfile Scan
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on Dockerfiles
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Run Hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "app/Dockerfile"
          failure-threshold: warning

      - name: Hadolint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "api/Dockerfile"
          failure-threshold: warning

  # ── Build & Container Image Scan ──────────────────────────────────
  build-and-scan:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, dependency-scan, config-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build Flask image
        run: docker build -t devops-final-app:${{ github.sha }} ./app

      - name: Build API image
        run: docker build -t devops-final-api:${{ github.sha }} ./api

      - name: Scan Flask image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "devops-final-app:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "devops-final-api:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  # ── Deploy (main branch only) ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: api
        run: npm ci --omit=dev

      - name: Build Docker images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: sleep 20

      - name: Post-deployment validation
        run: bash scripts/validate-env.sh

      - name: Health check
        run: bash scripts/healthcheck.sh

      - name: Deployment summary
        run: |
          echo "Deploy completed for commit ${{ github.sha }}"
          echo "Flask: http://localhost:5000/health"
          echo "API:   http://localhost:3000/health"
